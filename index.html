<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Performance Matrix</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <style>
        :root {
            --bg-main: #09090b;
            --card-bg: #141417;
            --card-border: #27272a;
            --text-title: #ffffff;
            --text-body: #e4e4e7;
            --text-muted: #71717a;
            --accent: #06b6d4;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.12);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ─── Bottom Navigation ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #101012;
            border-top: 1px solid var(--card-border);
            display: flex;
            padding: 8px 16px;
            z-index: 100;
        }

        .nav-link {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 0;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-link.active-view { color: var(--accent); }

        /* ─── View Panels ─── */
        .view-panel { display: none; }
        .view-panel.active-panel { display: block; }

        header { margin-bottom: 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0; text-transform: uppercase; }

        .live-date-header {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); margin: 4px 0 0 0; }

        /* ─── Day Tabs ─── */
        .day-tabs {
            display: flex;
            background: #18181b;
            padding: 4px;
            border-radius: 10px;
            gap: 4px;
            margin-bottom: 14px;
            border: 1px solid var(--card-border);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
        }
        .tab-btn.active { background: #27272a; color: var(--text-title); }

        /* ─── Timer Module ─── */
        .timer-module {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .timer-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timer-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .timer-value {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-title);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }
        .timer-value.running { color: var(--success); }
        .timer-value.rest-active { color: var(--accent); }

        .timer-sep {
            width: 1px;
            height: 30px;
            background: var(--card-border);
            flex-shrink: 0;
        }

        .timer-controls {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .timer-btn {
            background: #27272a;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 7px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 7px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .timer-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        .t-start:not(:disabled) {
            background: var(--success-glow);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .t-pause:not(:disabled) {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent);
            border-color: rgba(6, 182, 212, 0.25);
        }
        .t-finish {
            background: var(--danger-glow);
            color: var(--danger);
            border-color: rgba(244, 63, 94, 0.25);
        }
        .t-finish:hover:not(:disabled) { background: var(--danger); color: #000; }

        /* ─── Exercise Cards ─── */
        .ex-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .ex-title-block { display: flex; flex-direction: column; }
        .ex-name { font-size: 0.95rem; font-weight: 600; color: var(--text-title); }
        .ex-scheme { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .set-modifiers { display: flex; gap: 6px; }
        .mod-btn {
            background: #27272a;
            border: none;
            color: var(--text-body);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .sets-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-box {
            width: 42px;
            height: 42px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .set-box.active-done {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
        }

        /* ─── Edit Mode ─── */
        .edit-toggle-btn {
            background: #18181b;
            border: 1px solid var(--card-border);
            color: var(--text-body);
            padding: 6px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .edit-toggle-btn.mode-on {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ─── Calendar & Stats (Simplified for demo) ─── */
        .system-actions { margin-top: 32px; text-align: center; }
        .util-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 14px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
        }
        .util-btn.install-highlight {
            border-color: var(--accent);
            color: var(--accent);
            font-weight: bold;
            background: rgba(6, 182, 212, 0.05);
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <div id="panel-workout" class="view-panel active-panel">
        <header class="header-row">
            <div>
                <h1 id="workout-day-title">Loading...</h1>
                <div id="workout-date-header" class="live-date-header"></div>
                <p class="subtitle" id="workout-subtitle" style="margin-top:6px;">
                    Tap sets to log.
                </p>
            </div>
            <button id="edit-mode-toggle" class="edit-toggle-btn" onclick="toggleEditMode()">Edit Split</button>
        </header>

        <nav class="day-tabs" id="routine-tabs"></nav>

        <div class="timer-module">
            <div class="timer-display">
                <div class="timer-block">
                    <span class="timer-label">Session</span>
                    <span id="session-time-display" class="timer-value">00:00</span>
                </div>
            </div>
            <div class="timer-controls">
                <button id="timer-start-btn" class="timer-btn t-start" onclick="startSessionTimer()">Start</button>
                <button id="timer-pause-btn" class="timer-btn t-pause" onclick="pauseSessionTimer()" disabled>Pause</button>
                <button id="timer-finish-btn" class="timer-btn t-finish" onclick="finishSession()">Finish</button>
            </div>
        </div>

        <main id="exercise-cards-container"></main>
    </div>

    <div id="panel-calendar" class="view-panel">
        <header>
            <h1>Activity Matrix</h1>
            <p class="subtitle">Calendar UI pending next update.</p>
        </header>
    </div>

    <div id="panel-stats" class="view-panel">
        <header>
            <h1>System Settings</h1>
        </header>
        <div class="system-actions">
            <button id="pwa-install-btn" class="util-btn install-highlight" onclick="triggerPwaInstallation()">Install App to Device</button>
            <button class="util-btn" onclick="exportData()">Export Data Backup</button>
            <button class="util-btn" onclick="importData()">Import Data Backup</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-link active-view" onclick="switchMainView('workout', this)">Workout</button>
        <button class="nav-link" onclick="switchMainView('calendar', this)">Calendar</button>
        <button class="nav-link" onclick="switchMainView('stats', this)">Settings</button>
    </nav>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// SERVICE WORKER & PWA
// ══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { /* navigator.serviceWorker.register('sw.js'); */ });
}

let stashedPwaEvent = null;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    stashedPwaEvent = e;
});

window.triggerPwaInstallation = async function () {
    if (!confirm("Install this tracker to your device's home screen?")) return;
    if (stashedPwaEvent) {
        stashedPwaEvent.prompt();
        await stashedPwaEvent.userChoice;
    } else {
        alert("Direct installation isn't available right now. Use your browser's menu to add to home screen.");
    }
};

// ══════════════════════════════════════════════════════════════
// FACTORY DEFAULT SPLIT (4-Day V-Shape Routine)
// ══════════════════════════════════════════════════════════════
const factoryRoutine = [
    { id: "Mon", label: "MON", title: "Day 1 // Chest & Width Focus", exercises: [
        { name: "Incline Bench Press",       sets: 3, reps: "12" },
        { name: "Bench Press",               sets: 3, reps: "12" },
        { name: "Dumbbell Overhead Press",   sets: 3, reps: "12" },
        { name: "Lateral Raise",             sets: 4, reps: "15" },
        { name: "Tricep Rope Pushdown",      sets: 3, reps: "12" }
    ]},
    { id: "Tue", label: "TUE", title: "Day 2 // Lat Width & Abs", exercises: [
        { name: "Lat Pulldown",              sets: 4, reps: "12" },
        { name: "Seated Cable Row",          sets: 3, reps: "12" },
        { name: "Straight Arm Pulldown",     sets: 3, reps: "15" },
        { name: "Hanging Leg Raise",         sets: 4, reps: "15" },
        { name: "Cable Crunch",              sets: 3, reps: "20" }
    ]},
    { id: "Thu", label: "THU", title: "Day 3 // Delts & Upper Chest", exercises: [
        { name: "Dumbbell Shoulder Press",   sets: 4, reps: "10" },
        { name: "Incline Dumbbell Press",    sets: 3, reps: "12" },
        { name: "Cable Lateral Raise",       sets: 4, reps: "15" },
        { name: "Face Pulls",                sets: 3, reps: "15" },
        { name: "Overhead Tricep Extension", sets: 3, reps: "12" }
    ]},
    { id: "Fri", label: "FRI", title: "Day 4 // Back Thickness & Lower", exercises: [
        { name: "Barbell Row",               sets: 4, reps: "10" },
        { name: "Pull-ups",                  sets: 3, reps: "Failure" },
        { name: "Bulgarian Split Squat",     sets: 3, reps: "10" },
        { name: "Leg Curls",                 sets: 3, reps: "15" },
        { name: "Bicep Curls",               sets: 4, reps: "12" }
    ]}
];

// ══════════════════════════════════════════════════════════════
// CORE APP LOGIC
// ══════════════════════════════════════════════════════════════
let currentDayId = "Mon";
let sessionInterval;
let seconds = 0;

window.switchMainView = function(viewId, el) {
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-panel'));
    document.getElementById('panel-' + viewId).classList.add('active-panel');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-view'));
    el.classList.add('active-view');
};

function renderTabs() {
    const container = document.getElementById('routine-tabs');
    container.innerHTML = '';
    factoryRoutine.forEach(day => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${day.id === currentDayId ? 'active' : ''}`;
        btn.innerText = day.label;
        btn.onclick = () => {
            currentDayId = day.id;
            renderRoutine();
        };
        container.appendChild(btn);
    });
}

function renderRoutine() {
    renderTabs();
    const dayData = factoryRoutine.find(d => d.id === currentDayId);
    
    document.getElementById('workout-day-title').innerText = dayData.title;
    
    const today = new Date();
    document.getElementById('workout-date-header').innerText = today.toLocaleDateString('en-US', { 
        weekday: 'long', month: 'short', day: 'numeric' 
    });

    const container = document.getElementById('exercise-cards-container');
    container.innerHTML = '';

    dayData.exercises.forEach((ex) => {
        const card = document.createElement('div');
        card.className = 'ex-card';
        
        let setsHtml = '';
        for(let i = 0; i < ex.sets; i++) {
            setsHtml += `<div class="set-box" onclick="this.classList.toggle('active-done')">${ex.reps}</div>`;
        }

        card.innerHTML = `
            <div class="ex-header">
                <div class="ex-title-block">
                    <span class="ex-name">${ex.name}</span>
                    <span class="ex-scheme">${ex.sets} Sets × ${ex.reps} Reps</span>
                </div>
            </div>
            <div class="sets-grid">${setsHtml}</div>
        `;
        container.appendChild(card);
    });
}

// ══════════════════════════════════════════════════════════════
// TIMER SYSTEM
// ══════════════════════════════════════════════════════════════
window.startSessionTimer = function() {
    document.getElementById('timer-start-btn').disabled = true;
    document.getElementById('timer-pause-btn').disabled = false;
    
    sessionInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('session-time-display').innerText = `${m}:${s}`;
        document.getElementById('session-time-display').classList.add('running');
    }, 1000);
};

window.pauseSessionTimer = function() {
    clearInterval(sessionInterval);
    document.getElementById('timer-start-btn').disabled = false;
    document.getElementById('timer-pause-btn').disabled = true;
    document.getElementById('session-time-display').classList.remove('running');
};

window.finishSession = function() {
    pauseSessionTimer();
    seconds = 0;
    document.getElementById('session-time-display').innerText = "00:00";
    document.querySelectorAll('.set-box.active-done').forEach(el => el.classList.remove('active-done'));
    alert("Workout metrics secured. Great session.");
};

window.toggleEditMode = function() { alert("Edit mode coming soon!"); };
window.exportData = function() { alert("Exporting data backup..."); };
window.importData = function() { alert("Importing data backup..."); };

// Boot App
window.onload = renderRoutine;
</script>
</body>
</html>
