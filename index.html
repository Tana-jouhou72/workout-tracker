<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Performance Matrix</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <style>
        :root {
            --bg-main: #09090b;
            --card-bg: #141417;
            --card-border: #27272a;
            --text-title: #ffffff;
            --text-body: #e4e4e7;
            --text-muted: #71717a;
            --accent: #06b6d4;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.12);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ─── Bottom Navigation ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #101012;
            border-top: 1px solid var(--card-border);
            display: flex;
            padding: 8px 16px;
            z-index: 100;
        }

        .nav-link {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 0;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .nav-link.active-view { color: var(--accent); }

        /* ─── View Panels ─── */
        .view-panel { display: none; }
        .view-panel.active-panel { display: block; }

        header { margin-bottom: 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0; text-transform: uppercase; }

        .live-date-header {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); margin: 4px 0 0 0; }

        /* ─── Day Tabs ─── */
        .day-tabs {
            display: flex;
            background: #18181b;
            padding: 4px;
            border-radius: 10px;
            gap: 4px;
            margin-bottom: 14px;
            border: 1px solid var(--card-border);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
        }
        .tab-btn.active { background: #27272a; color: var(--text-title); }

        /* ─── Timer Module ─── */
        .timer-module {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 0;
        }

        .timer-block {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timer-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .timer-value {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-title);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }
        .timer-value.running { color: var(--success); }
        .timer-value.rest-active { color: var(--accent); }

        .timer-sep {
            width: 1px;
            height: 30px;
            background: var(--card-border);
            flex-shrink: 0;
        }

        .timer-controls {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .timer-btn {
            background: #27272a;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 7px 10px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 7px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .timer-btn:disabled { opacity: 0.28; cursor: not-allowed; }

        .t-start:not(:disabled) {
            background: var(--success-glow);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .t-pause:not(:disabled) {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent);
            border-color: rgba(6, 182, 212, 0.25);
        }
        .t-finish {
            background: var(--danger-glow);
            color: var(--danger);
            border-color: rgba(244, 63, 94, 0.25);
        }
        .t-finish:hover:not(:disabled) { background: var(--danger); color: #000; }

        /* ─── Exercise Cards ─── */
        .ex-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .ex-title-block { display: flex; flex-direction: column; }
        .ex-name { font-size: 0.95rem; font-weight: 600; color: var(--text-title); }
        .ex-scheme { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .set-modifiers { display: flex; gap: 6px; }
        .mod-btn {
            background: #27272a;
            border: none;
            color: var(--text-body);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .sets-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-box {
            width: 42px;
            height: 42px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .set-box.active-done {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
        }

        /* ─── Edit Mode ─── */
        .edit-toggle-btn {
            background: #18181b;
            border: 1px solid var(--card-border);
            color: var(--text-body);
            padding: 6px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .edit-toggle-btn.mode-on {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .delete-ex-btn {
            background: var(--danger-glow);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .delete-ex-btn:hover { background: var(--danger); color: #000; }

        .add-ex-form {
            background: #111113;
            border: 1px dashed var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

        .form-input {
            background: #18181b;
            border: 1px solid var(--card-border);
            color: var(--text-title);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .form-row-split { display: flex; gap: 12px; }
        .form-row-split .form-group { flex: 1; }

        .save-ex-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        /* ─── Calendar ─── */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 14px;
        }

        .weekday-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 6px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 8px;
            background: #18181b;
            color: var(--text-muted);
            border: 1px solid transparent;
        }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.has-workout {
            background: var(--success-glow);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
            font-weight: 700;
        }
        .cal-day.is-today-highlight { border: 1px solid var(--accent); color: var(--text-title); }

        /* ─── Analytics ─── */
        .date-group-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-row {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .duration-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--accent);
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        /* ─── Utilities ─── */
        .system-actions { margin-top: 32px; text-align: center; }
        .util-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 14px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
        }
        .util-btn.install-highlight {
            border-color: var(--accent);
            color: var(--accent);
            font-weight: bold;
            background: rgba(6, 182, 212, 0.05);
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <!-- ════════════════════════════════════
         PANEL 1: WORKOUT ENGINE
    ════════════════════════════════════ -->
    <div id="panel-workout" class="view-panel active-panel">
        <header class="header-row">
            <div>
                <h1 id="workout-day-title">Loading...</h1>
                <div id="workout-date-header" class="live-date-header"></div>
                <p class="subtitle" id="workout-subtitle" style="margin-top:6px;">
                    Tap sets to log. Use +/- to adjust volume.
                </p>
            </div>
            <button id="edit-mode-toggle" class="edit-toggle-btn" onclick="toggleEditMode()">Edit Split</button>
        </header>

        <nav class="day-tabs" id="routine-tabs"></nav>

        <!-- Dual Timer Module -->
        <div class="timer-module">
            <div class="timer-display">
                <div class="timer-block">
                    <span class="timer-label">Session</span>
                    <span id="session-time-display" class="timer-value">00:00</span>
                </div>
                <div class="timer-sep"></div>
                <div class="timer-block">
                    <span class="timer-label">Rest</span>
                    <span id="rest-time-display" class="timer-value">00:00</span>
                </div>
            </div>
            <div class="timer-controls">
                <button id="timer-start-btn" class="timer-btn t-start" onclick="startSessionTimer()">Start</button>
                <button id="timer-pause-btn" class="timer-btn t-pause" onclick="pauseSessionTimer()" disabled>Pause</button>
                <button id="timer-finish-btn" class="timer-btn t-finish" onclick="finishSession()">Finish</button>
            </div>
        </div>

        <main id="exercise-cards-container"></main>
        <div id="add-exercise-form-zone"></div>
    </div>

    <!-- ════════════════════════════════════
         PANEL 2: CALENDAR MATRIX
    ════════════════════════════════════ -->
    <div id="panel-calendar" class="view-panel">
        <header>
            <h1>Activity Matrix</h1>
            <p class="subtitle">Highlighted dates denote logged exercise history.</p>
        </header>
        <div class="calendar-header">
            <button class="mod-btn" onclick="adjustMonth(-1)">&lt;</button>
            <span id="calendar-month-year" style="font-weight:700;"></span>
            <button class="mod-btn" onclick="adjustMonth(1)">&gt;</button>
        </div>
        <div class="cal-grid" id="calendar-grid-target"></div>
    </div>

    <!-- ════════════════════════════════════
         PANEL 3: ANALYTICS & UTILITIES
    ════════════════════════════════════ -->
    <div id="panel-stats" class="view-panel">
        <header>
            <h1>Exercise Volume Metrics</h1>
            <p class="subtitle">Historical registry organized chronologically by day.</p>
        </header>
        <div id="analytics-target-list"></div>
        <div class="system-actions">
            <button id="pwa-install-btn" class="util-btn install-highlight" onclick="triggerPwaInstallation()">Install App to Device</button>
            <button class="util-btn" onclick="exportData()">Export Data Backup</button>
            <button class="util-btn" onclick="importData()">Import Data Backup</button>
            <button class="util-btn" style="color:var(--danger);" onclick="resetFactoryRoutine()">Reset Routine Defaults</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-link active-view" onclick="switchMainView('workout', this)">Workout</button>
        <button class="nav-link" onclick="switchMainView('calendar', this)">Calendar</button>
        <button class="nav-link" onclick="switchMainView('stats', this)">Analytics</button>
    </nav>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}

// ══════════════════════════════════════════════════════════════
// PWA INSTALL INTERCEPT
// ══════════════════════════════════════════════════════════════
let stashedPwaEvent = null;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    stashedPwaEvent = e;
});

window.triggerPwaInstallation = async function () {
    if (!confirm("Install this tracker to your device's home screen?")) return;
    if (stashedPwaEvent) {
        stashedPwaEvent.prompt();
        await stashedPwaEvent.userChoice;
    } else {
        alert(
            "Direct installation isn't available right now.\n\n" +
            "Possible reasons:\n" +
            "1. The app is already installed.\n" +
            "2. You're in an in-app browser — open in Chrome.\n" +
            "3. Use the three-dot menu → 'Add to Home screen'."
        );
    }
};

// ══════════════════════════════════════════════════════════════
// ✅ FIX #1 — CRASH-PROOF LOCALSTORAGE PARSER
//
// JSON.parse() on a corrupted string throws a SyntaxError that
// halts the entire <script> block, leaving the page frozen on
// "Loading...". This helper catches that and returns the fallback.
// ══════════════════════════════════════════════════════════════
function safeParse(key, fallback) {
    try {
        const raw = localStorage.getItem(key);
        if (raw === null || raw === '') return fallback;
        const parsed = JSON.parse(raw);
        if (parsed === null || parsed === undefined) return fallback;
        // Type guard: ensure we got the expected container type
        if (Array.isArray(fallback) && !Array.isArray(parsed))    return fallback;
        if (!Array.isArray(fallback) && typeof fallback === 'object'
            && (typeof parsed !== 'object' || Array.isArray(parsed))) return fallback;
        return parsed;
    } catch (e) {
        console.warn(`[safeParse] Corrupted key "${key}" — using fallback. Error:`, e.message);
        return fallback;
    }
}

// ══════════════════════════════════════════════════════════════
// FACTORY DEFAULT SPLIT
// ══════════════════════════════════════════════════════════════
const factoryRoutine = [
    { id: "Mon", label: "MON", title: "Monday // Chest & Width Focus", exercises: [
        { name: "Incline Bench Press",       sets: 3, reps: "12"    },
        { name: "Bench Press",               sets: 3, reps: "12"    },
        { name: "Dumbbell Overhead Press",   sets: 3, reps: "12"    },
        { name: "Lateral Raise",             sets: 4, reps: "15"    },
        { name: "Tricep Rope Pushdown",      sets: 3, reps: "12"    }
    ]},
    { id: "Tue", label: "TUE", title: "Tuesday // Lat Width & Abs", exercises: [
        { name: "Lat Pulldown",              sets: 4, reps: "12"
