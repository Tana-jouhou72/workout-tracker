<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Workout Tracker</title>
    <style>
        :root {
            --bg-main: #09090b;
            --card-bg: #141417;
            --card-border: #27272a;
            --text-title: #ffffff;
            --text-body: #e4e4e7;
            --text-muted: #71717a;
            --accent-glow: rgba(6, 182, 212, 0.15);
            --accent: #06b6d4; /* Cyber Cyan */
            --success: #10b981; /* Emerald */
            --success-glow: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 20px 16px;
            display: flex;
            flex-content: column;
            align-items: center;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--text-title);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 4px 0 0 0;
        }

        /* Day Selection Navigation Tabs */
        .day-tabs {
            display: flex;
            background: #18181b;
            padding: 4px;
            border-radius: 10px;
            gap: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
        }

        .tab-btn.active {
            background: #27272a;
            color: var(--text-title);
        }

        .tab-btn.is-today::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: var(--accent);
            border-radius: 50%;
        }

        /* Progress Bar */
        .progress-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-text {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            background: #27272a;
            width: 120px;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Exercise Cards Layout */
        .exercise-view {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 250px;
        }

        .ex-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ex-card.completed-card {
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(20, 20, 23, 0.6);
        }

        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .ex-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-title);
            letter-spacing: -0.01em;
            transition: color 0.2s ease;
        }

        .ex-card.completed-card .ex-name {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .ex-scheme {
            font-size: 0.8rem;
            font-weight: 700;
            background: #27272a;
            padding: 3px 8px;
            border-radius: 6px;
            color: var(--accent);
            letter-spacing: 0.05em;
        }

        /* Interaction Targets */
        .sets-grid {
            display: flex;
            gap: 10px;
        }

        .set-box {
            flex: 1;
            height: 44px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .set-box.active-done {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
            box-shadow: inset 0 0 6px rgba(16, 185, 129, 0.1);
        }

        /* Footer Utilities */
        .footer-actions {
            margin-top: 32px;
            display: flex;
            justify-content: center;
        }

        .clear-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s ease;
            padding: 8px 16px;
        }

        .clear-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header>
            <h1 id="header-title">Workout Schedule</h1>
            <p class="subtitle" id="global-status">Select a target day below</p>
        </header>

        <nav class="day-tabs" id="day-tabs-container"></nav>

        <div class="progress-container">
            <span class="progress-text" id="progress-label">0% Complete</span>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <main class="exercise-view" id="exercise-render-zone"></main>

        <footer class="footer-actions">
            <button class="clear-btn" onclick="resetAllData()">Reset All Logged Progress</button>
        </footer>
    </div>

    <script>
        // Data blueprint compiled perfectly from your sheet
        const routineData = [
            {
                dayId: "Mon",
                label: "MON",
                fullName: "Monday // Push Focus",
                exercises: [
                    { name: "Incline Bench Press", sets: 3, reps: "12" },
                    { name: "Bench Press", sets: 3, reps: "12" },
                    { name: "Dumbbell Overhead Press", sets: 3, reps: "12" },
                    { name: "Lateral Raise", sets: 4, reps: "15" },
                    { name: "Tricep Rope Pushdown", sets: 3, reps: "12" }
                ]
            },
            {
                dayId: "Tue",
                label: "TUE",
                fullName: "Tuesday // Pull & Abs",
                exercises: [
                    { name: "Lat Pulldown", sets: 4, reps: "12" },
                    { name: "Seated Cable Row", sets: 3, reps: "12" },
                    { name: "Facepull", sets: 3, reps: "15" },
                    { name: "Bicep Curl", sets: 3, reps: "12" },
                    { name: "Hanging Leg Raise", sets: 3, reps: "10" }
                ]
            },
            {
                dayId: "Thu",
                label: "THU",
                fullName: "Thursday // Shoulders & Arms",
                exercises: [
                    { name: "Machine Shoulder Press", sets: 3, reps: "12" },
                    { name: "Lateral Raise", sets: 4, reps: "15" },
                    { name: "Rear Delt Fly", sets: 3, reps: "12" },
                    { name: "Bicep Curl", sets: 3, reps: "12" },
                    { name: "Dumbbell Overhead Extension", sets: 3, reps: "10" }
                ]
            },
            {
                dayId: "Sat",
                label: "SAT",
                fullName: "Saturday // Hypertrophy Mix",
                exercises: [
                    { name: "Incline Bench Press", sets: 3, reps: "12" },
                    { name: "Lat Pulldown", sets: 3, reps: "12" },
                    { name: "Cable Lateral Raise", sets: 3, reps: "12" },
                    { name: "Hammer Curl", sets: 3, reps: "12" }
                ]
            }
        ];

        const daysMapping = { 1: "Mon", 2: "Tue", 4: "Thu", 6: "Sat" };
        const realDayNum = new Date().getDay();
        const trueTodayId = daysMapping[realDayNum] || null;
        
        // Active display state tracks selected day (defaults to today if active, else Mon)
        let currentSelectedDayId = trueTodayId || "Mon";

        function initApp() {
            renderTabs();
            renderActiveDay();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('day-tabs-container');
            let tabsHtml = '';
            
            routineData.forEach(day => {
                const isActive = day.dayId === currentSelectedDayId;
                const isToday = day.dayId === trueTodayId;
                tabsHtml += `
                    <button class="tab-btn ${isActive ? 'active' : ''} ${isToday ? 'is-today' : ''}" 
                            onclick="switchDayView('${day.dayId}')">
                        ${day.label}
                    </button>
                `;
            });
            tabsContainer.innerHTML = tabsHtml;
        }

        window.switchDayView = function(dayId) {
            currentSelectedDayId = dayId;
            renderTabs();
            renderActiveDay();
        }

        function renderActiveDay() {
            const renderZone = document.getElementById('exercise-render-zone');
            const targetData = routineData.find(d => d.dayId === currentSelectedDayId);
            
            document.getElementById('header-title').textContent = targetData.fullName;
            document.getElementById('global-status').textContent = targetData.dayId === trueTodayId ? "Active schedule for today" : "Viewing alternate day profile";

            let exercisesHtml = '';
            let globalTotalSets = 0;
            let globalCompletedSets = 0;

            targetData.exercises.forEach((ex, exIdx) => {
                let setsHtml = '';
                let completedCount = 0;
                globalTotalSets += ex.sets;

                for (let s = 1; s <= ex.sets; s++) {
                    const storageKey = `${targetData.dayId}-${exIdx}-set-${s}`;
                    const isDone = localStorage.getItem(storageKey) === 'true';
                    
                    if (isDone) {
                        completedCount++;
                        globalCompletedSets++;
                    }

                    setsHtml += `
                        <div class="set-box ${isDone ? 'active-done' : ''}" 
                             onclick="toggleSetAction('${targetData.dayId}', ${exIdx}, ${s}, this)">
                            ${isDone ? '✓' : 'S' + s}
                        </div>
                    `;
                }

                const isExComplete = completedCount === ex.sets;

                exercisesHtml += `
                    <div class="ex-card ${isExComplete ? 'completed-card' : ''}" id="card-${targetData.dayId}-${exIdx}">
                        <div class="ex-header">
                            <span class="ex-name">${ex.name}</span>
                            <span class="ex-scheme">${ex.sets}x${ex.reps}</span>
                        </div>
                        <div class="sets-grid">
                            ${setsHtml}
                        </div>
                    </div>
                `;
            });

            renderZone.innerHTML = exercisesHtml;
            updateMetrics(globalCompletedSets, globalTotalSets);
        }

        window.toggleSetAction = function(dayId, exIdx, setNum, element) {
            const storageKey = `${dayId}-${exIdx}-set-${setNum}`;
            const isCurrentlyDone = localStorage.getItem(storageKey) === 'true';

            if (isCurrentlyDone) {
                localStorage.removeItem(storageKey);
                element.classList.remove('active-done');
                element.textContent = 'S' + setNum;
            } else {
                localStorage.setItem(storageKey, 'true');
                element.classList.add('active-done');
                element.textContent = '✓';
            }

            // Real-time card state re-evaluation
            const targetData = routineData.find(d => d.dayId === dayId);
            const cardElement = document.getElementById(`card-${dayId}-${exIdx}`);
            const siblingBoxes = cardElement.querySelectorAll('.set-box');
            
            let completedCount = 0;
            siblingBoxes.forEach(box => {
                if (box.classList.contains('active-done')) completedCount++;
            });

            if (completedCount === siblingBoxes.length) {
                cardElement.classList.add('completed-card');
            } else {
                cardElement.classList.remove('completed-card');
            }

            // Recalculate top session bar live
            recalculateMetricsOnly(dayId);
        }

        function recalculateMetricsOnly(dayId) {
            const targetData = routineData.find(d => d.dayId === dayId);
            let total = 0;
            let finished = 0;

            targetData.exercises.forEach((ex, exIdx) => {
                total += ex.sets;
                for (let s = 1; s <= ex.sets; s++) {
                    if (localStorage.getItem(`${dayId}-${exIdx}-set-${s}`) === 'true') {
                        finished++;
                    }
                }
            });
            updateMetrics(finished, total);
        }

        function updateMetrics(completed, total) {
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-label').textContent = `${percent}% Finished (${completed}/${total} Sets)`;
        }

        window.resetAllData = function() {
            if (confirm("Reset tracking data across all days?")) {
                localStorage.clear();
                renderActiveDay();
            }
        }

        initApp();
    </script>
</body>
</html>
