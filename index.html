<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Performance Matrix</title>
    <style>
        :root {
            --bg-main: #09090b;
            --card-bg: #141417;
            --card-border: #27272a;
            --text-title: #ffffff;
            --text-body: #e4e4e7;
            --text-muted: #71717a;
            --accent: #06b6d4; 
            --success: #10b981; 
            --success-glow: rgba(16, 185, 129, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Bottom Core Navigation Matrix */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #101012;
            border-top: 1px solid var(--card-border);
            display: flex;
            padding: 8px 16px;
            z-index: 100;
        }

        .nav-link {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 0;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-link.active-view {
            color: var(--accent);
        }

        /* View Panels */
        .view-panel { display: none; }
        .view-panel.active-panel { display: block; }

        header { margin-bottom: 20px; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0; text-transform: uppercase; }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); margin: 4px 0 0 0; }

        /* Workout View Customization Controls */
        .day-tabs {
            display: flex;
            background: #18181b;
            padding: 4px;
            border-radius: 10px;
            gap: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--card-border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
        }

        .tab-btn.active { background: #27272a; color: var(--text-title); }

        .ex-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .ex-title-block { display: flex; flex-direction: column; }
        .ex-name { font-size: 0.95rem; font-weight: 600; color: var(--text-title); }
        .ex-scheme { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .set-modifiers { display: flex; gap: 6px; }
        .mod-btn {
            background: #27272a;
            border: none;
            color: var(--text-body);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .sets-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-box {
            width: 42px;
            height: 42px;
            background: #18181b;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .set-box.active-done {
            background: var(--success-glow);
            border-color: var(--success);
            color: var(--success);
        }

        /* Calendar View Matrix Layout */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 14px;
        }

        .weekday-label {
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            padding-bottom: 6px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 8px;
            background: #18181b;
            color: var(--text-muted);
            border: 1px solid transparent;
        }

        .cal-day.empty { background: transparent; border: none; }
        .cal-day.has-workout {
            background: var(--success-glow);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
            font-weight: 700;
        }
        .cal-day.is-today-highlight { border: 1px solid var(--accent); color: var(--text-title); }

        /* Analytics Stack List */
        .stat-row {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-count { font-weight: 700; color: var(--accent); font-size: 0.95rem; }

        .system-actions { margin-top: 24px; text-align: center; }
        .util-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 8px 14px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <div id="panel-workout" class="view-panel active-panel">
            <header>
                <h1 id="workout-day-title">Target Loading...</h1>
                <p class="subtitle">Tap completed sets. Use +/- to add volume.</p>
            </header>
            <nav class="day-tabs" id="routine-tabs"></nav>
            <main id="exercise-cards-container"></main>
        </div>

        <div id="panel-calendar" class="view-panel">
            <header>
                <h1>Activity Matrix</h1>
                <p class="subtitle">Highlighted dates denote logged exercise history.</p>
            </header>
            <div class="calendar-header">
                <button class="mod-btn" onclick="adjustMonth(-1)">&lt;</button>
                <span id="calendar-month-year" style="font-weight:700;"></span>
                <button class="mod-btn" onclick="adjustMonth(1)">&gt;</button>
            </div>
            <div class="cal-grid" id="calendar-grid-target"></div>
        </div>

        <div id="panel-stats" class="view-panel">
            <header>
                <h1>Exercise Volume Metrics</h1>
                <p class="subtitle">Accumulated working sets historical registry.</p>
            </header>
            <div id="analytics-target-list"></div>
            
            <div class="system-actions">
                <button class="util-btn" onclick="exportData()">Export Data Backup</button>
                <button class="util-btn" onclick="importData()">Import Data Backup</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-link active-view" onclick="switchMainView('workout', this)">Workout</button>
            <button class="nav-link" onclick="switchMainView('calendar', this)">Calendar</button>
            <button class="nav-link" onclick="switchMainView('stats', this)">Analytics</button>
        </nav>

    </div>

    <script>
        // Production-ready data layout structure from your precise tracking routine
        const baseRoutine = [
            { id: "Mon", label: "MON", title: "Monday // Chest & Width Focus", exercises: [
                { name: "Incline Bench Press", sets: 3, reps: "12" },
                { name: "Bench Press", sets: 3, reps: "12" },
                { name: "Dumbbell Overhead Press", sets: 3, reps: "12" },
                { name: "Lateral Raise", sets: 4, reps: "15" },
                { name: "Tricep Rope Pushdown", sets: 3, reps: "12" }
            ]},
            { id: "Tue", label: "TUE", title: "Tuesday // Lat Width & Abs", exercises: [
                { name: "Lat Pulldown", sets: 4, reps: "12" },
                { name: "Seated Cable Row", sets: 3, reps: "12" },
                { name: "Facepull", sets: 3, reps: "15" },
                { name: "Bicep Curl", sets: 3, reps: "12" },
                { name: "Hanging Leg Raise", sets: 3, reps: "10" }
            ]},
            { id: "Thu", label: "THU", title: "Thursday // Shoulder Width Engine", exercises: [
                { name: "Machine Shoulder Press", sets: 3, reps: "12" },
                { name: "Lateral Raise", sets: 4, reps: "15" },
                { name: "Rear Delt Fly", sets: 3, reps: "12" },
                { name: "Bicep Curl", sets: 3, reps: "12" },
                { name: "Dumbbell Overhead Extension", sets: 3, reps: "10" }
            ]},
            { id: "Sat", label: "SAT", title: "Saturday // Density Hypertrophy", exercises: [
                { name: "Incline Bench Press", sets: 3, reps: "12" },
                { name: "Lat Pulldown", sets: 3, reps: "12" },
                { name: "Cable Lateral Raise", sets: 3, reps: "12" },
                { name: "Hammer Curl", sets: 3, reps: "12" }
            ]}
        ];

        // Central State Engines
        let selectedDayId = baseRoutine[0].id;
        let viewDate = new Date(); // Tracks the rendered month frame

        // Initialize state arrays from secure localStorage engines
        let dynamicScales = JSON.parse(localStorage.getItem('alpha_scales')) || {};
        let operationalLog = JSON.parse(localStorage.getItem('alpha_log')) || {};

        function getLocalDateString(date = new Date()) {
            const offset = date.getTimezoneOffset();
            const adjustedDate = new Date(date.getTime() - (offset * 60 * 1000));
            return adjustedDate.toISOString().split('T')[0];
        }

        const todayStamp = getLocalDateString();

        function switchMainView(targetPanel, navBtn) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-panel'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active-view'));
            
            document.getElementById(`panel-${targetPanel}`).classList.add('active-panel');
            navBtn.classList.add('active-view');

            if (targetPanel === 'calendar') renderCalendarView();
            if (targetPanel === 'stats') renderStatsView();
        }

        // --- WORKOUT TAB FUNCTIONS ---
        function initWorkoutTab() {
            const tabsContainer = document.getElementById('routine-tabs');
            tabsContainer.innerHTML = baseRoutine.map(day => `
                <button class="tab-btn ${day.id === selectedDayId ? 'active' : ''}" onclick="changeActiveRoutineDay('${day.id}')">
                    ${day.label}
                </button>
            `).join('');
            renderExerciseCards();
        }

        function changeActiveRoutineDay(dayId) {
            selectedDayId = dayId;
            initWorkoutTab();
        }

        function renderExerciseCards() {
            const container = document.getElementById('exercise-cards-container');
            const dataProfile = baseRoutine.find(d => d.id === selectedDayId);
            document.getElementById('workout-day-title').textContent = dataProfile.title;

            container.innerHTML = dataProfile.exercises.map((ex, idx) => {
                const scaleKey = `${todayStamp}-${selectedDayId}-${idx}`;
                const currentSetCount = dynamicScales[scaleKey] !== undefined ? dynamicScales[scaleKey] : ex.sets;
                
                let setBoxesHtml = '';
                for (let s = 1; s <= currentSetCount; s++) {
                    const logId = `${todayStamp}-${selectedDayId}-${idx}-S${s}`;
                    const activeChecked = operationalLog[logId] ? 'active-done' : '';
                    setBoxesHtml += `
                        <div class="set-box ${activeChecked}" onclick="toggleSetEngagement('${logId}')">
                            ${operationalLog[logId] ? '✓' : 'S' + s}
                        </div>
                    `;
                }

                return `
                    <div class="ex-card">
                        <div class="ex-header">
                            <div class="ex-title-block">
                                <span class="ex-name">${ex.name}</span>
                                <span class="ex-scheme">${currentSetCount} Sets x ${ex.reps} Reps</span>
                            </div>
                            <div class="set-modifiers">
                                <button class="mod-btn" onclick="scaleSetVolume('${scaleKey}', -1)">-</button>
                                <button class="mod-btn" onclick="scaleSetVolume('${scaleKey}', 1)">+</button>
                            </div>
                        </div>
                        <div class="sets-grid">${setBoxesHtml}</div>
                    </div>
                `;
            }).join('');
        }

        window.scaleSetVolume = function(scaleKey, change) {
            const defaultSets = baseRoutine.find(d => d.id === selectedDayId).exercises[scaleKey.split('-').pop()].sets;
            let current = dynamicScales[scaleKey] !== undefined ? dynamicScales[scaleKey] : defaultSets;
            current = Math.max(0, current + change);
            dynamicScales[scaleKey] = current;
            localStorage.setItem('alpha_scales', JSON.stringify(dynamicScales));
            renderExerciseCards();
        }

        window.toggleSetEngagement = function(logId) {
            if (operationalLog[logId]) {
                delete operationalLog[logId];
            } else {
                operationalLog[logId] = { exerciseName: getExNameFromLogId(logId), timestamp: Date.now() };
            }
            localStorage.setItem('alpha_log', JSON.stringify(operationalLog));
            renderExerciseCards();
        }

        function getExNameFromLogId(logId) {
            const parts = logId.split('-');
            const dayId = parts[3]; 
            const exIdx = parts[4]; 
            return baseRoutine.find(d => d.id === dayId).exercises[exIdx].name;
        }

        // --- CALENDAR TAB FUNCTIONS ---
        window.adjustMonth = function(direction) {
            viewDate.setMonth(viewDate.getMonth() + direction);
            renderCalendarView();
        }

        function renderCalendarView() {
            const targetGrid = document.getElementById('calendar-grid-target');
            const monthYearLabel = document.getElementById('calendar-month-year');
            
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            
            monthYearLabel.textContent = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            
            let gridHtml = ['SU', 'MO', 'TU', 'WE', 'TH', 'FR', 'SA'].map(d => `<div class="weekday-label">${d}</div>`).join('');
            
            for (let i = 0; i < firstDayIndex; i++) {
                gridHtml += `<div class="cal-day empty"></div>`;
            }
            
            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                // Scan matrix logs to evaluate if sets were mapped to this layout code date
                let hasLoggedWorkout = Object.keys(operationalLog).some(key => key.startsWith(dateString));
                const isToday = dateString === todayStamp ? 'is-today-highlight' : '';
                const workoutClass = hasLoggedWorkout ? 'has-workout' : '';
                
                gridHtml += `<div class="cal-day ${isToday} ${workoutClass}">${day}</div>`;
            }
            
            targetGrid.innerHTML = gridHtml;
        }

        // --- ANALYTICS TAB FUNCTIONS ---
        function renderStatsView() {
            const listTarget = document.getElementById('analytics-target-list');
            let volumeAggregation = {};

            // Accumulate sets dynamically from records
            Object.values(operationalLog).forEach(entry => {
                if(entry && entry.exerciseName) {
                    volumeAggregation[entry.exerciseName] = (volumeAggregation[entry.exerciseName] || 0) + 1;
                }
            });

            if (Object.keys(volumeAggregation).length === 0) {
                listTarget.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:40px;">No workout volume logged yet.</p>`;
                return;
            }

            listTarget.innerHTML = Object.entries(volumeAggregation)
                .sort((a, b) => b[1] - a[1]) // High-to-low ranking
                .map(([name, totalSets]) => `
                    <div class="stat-row">
                        <span style="font-weight:600; font-size:0.9rem;">${name}</span>
                        <span class="stat-count">${totalSets} Total Sets</span>
                    </div>
                `).join('');
        }

        // --- BACKUP UTILITIES ---
        window.exportData = function() {
            const dataPkg = { log: operationalLog, scales: dynamicScales };
            const encryptedStr = btoa(JSON.stringify(dataPkg));
            navigator.clipboard.writeText(encryptedStr);
            alert("Secure backup data code copied directly to your clipboard! Paste and save it safely anywhere.");
        }

        window.importData = function() {
            const code = prompt("Paste your exported backup code package string below:");
            if (!code) return;
            try {
                const parsed = JSON.parse(atob(code));
                if (parsed.log && parsed.scales) {
                    operationalLog = parsed.log;
                    dynamicScales = parsed.scales;
                    localStorage.setItem('alpha_log', JSON.stringify(operationalLog));
                    localStorage.setItem('alpha_scales', JSON.stringify(dynamicScales));
                    alert("Import successful! Data state synchronized.");
                    renderExerciseCards();
                } else { alert("Invalid backup profile layout structural schema."); }
            } catch(e) { alert("Data verification processing error."); }
        }

        // Auto-detect current day mapping context to match system parameters on init
        const daysTrackerMap = { 1: "Mon", 2: "Tue", 4: "Thu", 6: "Sat" };
        const systemDayIndex = new Date().getDay();
        if (daysTrackerMap[systemDayIndex]) {
            selectedDayId = daysTrackerMap[systemDayIndex];
        }

        initWorkoutTab();
    </script>
</body>
</html>
