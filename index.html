<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Workout Tracker</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --border-color: #24354f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 { margin: 0; font-size: 1.4rem; letter-spacing: 0.05em; text-transform: uppercase; }
        .status-p { margin: 4px 0 0; font-size: 0.85rem; color: var(--accent); font-weight: 600; }

        .day-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid transparent;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .day-container.current-day-active {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
        }

        .day-title {
            font-size: 1.15rem;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .today-badge {
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .exercise-row {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .exercise-row:last-child { border-bottom: none; }

        .exercise-info {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .ex-name { font-weight: 600; font-size: 0.95rem; }
        .ex-target { font-size: 0.85rem; color: var(--text-muted); font-weight: bold; }

        .sets-tracker {
            display: flex;
            gap: 12px;
        }

        .set-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(56, 189, 248, 0.05);
        }

        .set-circle.completed {
            background-color: var(--success);
            border-color: var(--success);
            color: #0b0f19;
            transform: scale(0.95);
        }

        .exercise-row.all-done {
            opacity: 0.35;
        }

        .reset-btn {
            display: block;
            width: 100%;
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-top: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Weekly Workout Schedule</h1>
        <p id="today-display" class="status-p">Syncing schedule...</p>
    </header>

    <div id="workout-app"></div>

    <button class="reset-btn" onclick="clearAllProgress()">Reset Week's Progress</button>

    <script>
        // Exact schedule compiled perfectly from your spreadsheet image
        const routineData = [
            {
                dayName: "Monday",
                id: "Mon",
                exercises: [
                    { name: "Incline Bench Press", sets: 3, reps: "12" },
                    { name: "Bench Press", sets: 3, reps: "12" },
                    { name: "Dumbbell Overhead Press", sets: 3, reps: "12" },
                    { name: "Lateral Raise", sets: 4, reps: "15" },
                    { name: "Tricep Rope Pushdown", sets: 3, reps: "12" }
                ]
            },
            {
                dayName: "Tuesday",
                id: "Tue",
                exercises: [
                    { name: "Lat Pulldown", sets: 4, reps: "12" },
                    { name: "Seated Cable Row", sets: 3, reps: "12" },
                    { name: "Facepull", sets: 3, reps: "15" },
                    { name: "Bicep Curl", sets: 3, reps: "12" },
                    { name: "Hanging Leg Raise", sets: 3, reps: "10" }
                ]
            },
            {
                dayName: "Thursday",
                id: "Thu",
                exercises: [
                    { name: "Machine Shoulder Press", sets: 3, reps: "12" },
                    { name: "Lateral Raise", sets: 4, reps: "15" },
                    { name: "Rear Delt Fly", sets: 3, reps: "12" },
                    { name: "Bicep Curl", sets: 3, reps: "12" },
                    { name: "Dumbbell Overhead Extension", sets: 3, reps: "10" }
                ]
            },
            {
                dayName: "Saturday",
                id: "Sat",
                exercises: [
                    { name: "Incline Bench Press", sets: 3, reps: "12" },
                    { name: "Lat Pulldown", sets: 3, reps: "12" },
                    { name: "Cable Lateral Raise", sets: 3, reps: "12" },
                    { name: "Hammer Curl", sets: 3, reps: "12" }
                ]
            }
        ];

        // System to align JavaScript days to your active split days
        const daysMap = { 1: "Mon", 2: "Tue", 4: "Thu", 6: "Sat" };
        const currentDayNum = new Date().getDay(); // 0 = Sun, 1 = Mon...
        const activeDayId = daysMap[currentDayNum] || null;

        function renderApp() {
            const appContainer = document.getElementById('workout-app');
            const todayDisplay = document.getElementById('today-display');
            
            if (activeDayId) {
                todayDisplay.textContent = `Today is training day! Focus up.`;
            } else {
                todayDisplay.textContent = `Rest Day — Recovery & Nutrition Mode`;
            }

            let htmlContent = '';

            routineData.forEach(day => {
                const isToday = day.id === activeDayId;
                htmlContent += `
                    <div class="day-container ${isToday ? 'current-day-active' : ''}">
                        <div class="day-title">
                            <span>${day.dayName}</span>
                            ${isToday ? '<span class="today-badge">Today</span>' : ''}
                        </div>
                `;

                day.exercises.forEach((ex, exIndex) => {
                    let circlesHtml = '';
                    let allSetsDone = true;
                    
                    for(let i = 1; i <= ex.sets; i++) {
                        const storageKey = `${day.id}-${exIndex}-set-${i}`;
                        const isDone = localStorage.getItem(storageKey) === 'true';
                        if(!isDone) allSetsDone = false;

                        circlesHtml += `
                            <div class="set-circle ${isDone ? 'completed' : ''}" 
                                 onclick="toggleSet('${day.id}', ${exIndex}, ${i}, this, ${ex.sets})">
                                ${isDone ? '✓' : i}
                            </div>
                        `;
                    }

                    htmlContent += `
                        <div class="exercise-row ${allSetsDone ? 'all-done' : ''}" id="row-${day.id}-${exIndex}">
                            <div class="exercise-info">
                                <div class="ex-name">${ex.name}</div>
                                <div class="ex-target">${ex.sets}x${ex.reps}</div>
                            </div>
                            <div class="sets-tracker">
                                ${circlesHtml}
                            </div>
                        </div>
                    `;
                });

                htmlContent += `</div>`;
            });

            appContainer.innerHTML = htmlContent;
        }

        window.toggleSet = function(dayId, exIndex, setNum, el, totalSets) {
            const key = `${dayId}-${exIndex}-set-${setNum}`;
            const currentlyDone = localStorage.getItem(key) === 'true';
            
            if (currentlyDone) {
                localStorage.removeItem(key);
                el.classList.remove('completed');
                el.textContent = setNum;
            } else {
                localStorage.setItem(key, 'true');
                el.classList.add('completed');
                el.textContent = '✓';
            }

            // Real-time block styling evaluation
            const parentRow = document.getElementById(`row-${dayId}-${exIndex}`);
            const circles = parentRow.querySelectorAll('.set-circle');
            let completedCount = 0;
            circles.forEach(c => { if(c.classList.contains('completed')) completedCount++; });

            if(completedCount === totalSets) {
                parentRow.classList.add('all-done');
            } else {
                parentRow.classList.remove('all-done');
            }
        }

        window.clearAllProgress = function() {
            if(confirm("Are you sure you want to wipe out all checkmarks for this week?")) {
                localStorage.clear();
                renderApp();
            }
        }

        renderApp();
    </script>
</body>
</html>
