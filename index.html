<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Performance Matrix</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    
    <style>
        :root {
            --bg-main: #09090b;
            --card-bg: #141417;
            --card-border: #27272a;
            --text-title: #ffffff;
            --text-body: #e4e4e7;
            --text-muted: #71717a;
            --accent: #06b6d4; 
            --success: #10b981; 
            --success-glow: rgba(16, 185, 129, 0.12);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Bottom Navigation Matrix */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #101012;
            border-top: 1px solid var(--card-border);
            display: flex;
            padding: 8px 16px;
            z-index: 100;
        }

        .nav-link {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 10px 0;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-link.active-view { color: var(--accent); }

        /* View Panels */
        .view-panel { display: none; }
        .view-panel.active-panel { display: block; }

        header { margin-bottom: 20px; }
        .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0; text-transform: uppercase; }
        
        .live-date-header {
            margin: 4px 0 0 0;
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .subtitle { font-size: 0.8rem; color: var(--text-muted); margin: 4px 0 0 0; }

        /* Timer Module Custom UI */
        .timer-dashboard {
            background: #111113;
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: inset 0 0 16px rgba(0,0,0,0.4);
        }
        .main-timer { 
            font-size: 2.4rem; 
            font-weight: 800; 
            color: var(--text-title); 
            font-variant-numeric: tabular-nums; 
            margin: 4px 0;
            letter-spacing: 0.02em;
        }
        .rest-timer { 
            font-size: 0.9rem; 
            color: var(--success); 
            margin-top: 14px; 
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .timer-controls { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
        }
        .btn-timer { 
            padding: 10px 24px; 
            border-radius: 8px; 
            font-weight: 800; 
            border: none; 
            cursor: pointer; 
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.1s ease;
        }
        .btn-timer:active { transform: scale(0.95); }
        .btn-start { background: var(--success); color: #000; }
        .btn-pause { background: #f59e0b; color: #000; }
        .btn-stop { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        /* Workout View Tabs */
        .day-tabs {
            display: flex;
            background: #18181b;
            padding: 4px;
            border-radius: 10px;
            gap: 4px;
            margin-bottom: 16px;
            border: 1px solid var(--card-border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 0;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 7px;
            cursor: pointer;
        }

        .tab-btn.active { background: #27272a; color: var(--text-title); }

        .ex-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }

        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .ex-title-block { display: flex; flex-direction: column; }
        .ex-name { font-size: 0.95rem; font-weight: 600; color: var(--text-title); }
        .ex-scheme { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .set-modifiers { display: flex; gap: 6px; }
        .mod-btn {
            background: #27272a; border: none; color: var(--text-body);
            width: 28px; height: 28px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }

        .sets-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-box {
            width: 42px; height: 42px; background: #18181b; border: 1px solid var(--card-border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: var(--text-muted); cursor: pointer; user-select: none;
        }

        .set-box.active-done { background: var(--success-glow); border-color: var(--success); color: var(--success); }

        /* Editing Panel Additions */
        .edit-toggle-btn {
            background: #18181b; border: 1px solid var(--card-border); color: var(--text-body);
            padding: 6px 10px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .edit-toggle-btn.mode-on { background: rgba(6, 182, 212, 0.1); border-color: var(--accent); color: var(--accent); }
        .delete-ex-btn {
            background: var(--danger-glow); border: 1px solid var(--danger); color: var(--danger);
            padding: 6px 12px; font-size: 0.75rem; font-weight: bold; border-radius: 6px; cursor: pointer;
        }
        .add-ex-form {
            background: #111113; border: 1px dashed var(--card-border); border-radius: 14px;
            padding: 16px; margin-top: 16px; display: flex; flex-direction: column; gap: 12px;
        }
        .form-title { font-size: 0.85rem; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .form-input { background: #18181b; border: 1px solid var(--card-border); color: var(--text-title); padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .form-row-split { display: flex; gap: 12px; }
        .form-row-split .form-group { flex: 1; }
        .save-ex-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; margin-top: 4px; }

        /* Calendar View Layout */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; background: var(--card-bg); border: 1px solid var(--card-border); padding: 12px; border-radius: 14px; }
        .weekday-label { text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); padding-bottom: 6px; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; border-radius: 8px; background: #18181b; color: var(--text-muted); border: 1px solid transparent; }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.has-workout { background: var(--success-glow); color: var(--success); border-color: rgba(16, 185, 129, 0.3); font-weight: 700; }
        .cal-day.is-today-highlight { border: 1px solid var(--accent); color: var(--text-title); }

        /* Analytics Blocks */
        .date-group-title { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-row { background: var(--card-bg); border: 1px solid var(--card-border); padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .stat-count { font-weight: 700; color: var(--success); font-size: 0.9rem; }
        .system-actions { margin-top: 32px; text-align: center; }
        .util-btn { background: transparent; border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 14px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; margin: 4px; }
        .util-btn.install-highlight { border-color: var(--accent); color: var(--accent); font-weight: bold; background: rgba(6, 182, 212, 0.05); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div id="panel-workout" class="view-panel active-panel">
            <header class="header-row">
                <div>
                    <h1 id="workout-day-title">Target Loading...</h1>
                    <div id="workout-date-header" class="live-date-header"></div>
                    <p class="subtitle" id="workout-subtitle" style="margin-top: 6px;">Tap completed sets. Use +/- to add volume.</p>
                </div>
                <button id="edit-mode-toggle" class="edit-toggle-btn" onclick="toggleEditMode()">Edit Split</button>
            </header>
            <nav class="day-tabs" id="routine-tabs"></nav>
            
            <div id="timer-dashboard-zone"></div>
            <main id="exercise-cards-container"></main>
            <div id="add-exercise-form-zone"></div>
        </div>

        <div id="panel-calendar" class="view-panel">
            <header>
                <h1>Activity Matrix</h1>
                <p class="subtitle">Highlighted dates denote logged exercise history.</p>
            </header>
            <div class="calendar-header">
                <button class="mod-btn" onclick="adjustMonth(-1)">&lt;</button>
                <span id="calendar-month-year" style="font-weight:700;"></span>
                <button class="mod-btn" onclick="adjustMonth(1)">&gt;</button>
            </div>
            <div class="cal-grid" id="calendar-grid-target"></div>
        </div>

        <div id="panel-stats" class="view-panel">
            <header>
                <h1>Exercise Volume Metrics</h1>
                <p class="subtitle">Historical registry organized chronologically by day.</p>
            </header>
            <div id="analytics-target-list"></div>
            
            <div class="system-actions">
                <button id="pwa-install-btn" class="util-btn install-highlight" onclick="triggerPwaInstallation()">Install App to Device</button>
                <button class="util-btn" onclick="exportData()">Export Data Backup</button>
                <button class="util-btn" onclick="importData()">Import Data Backup</button>
                <button class="util-btn" style="color: var(--danger);" onclick="resetFactoryRoutine()">Reset Routine Defaults</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-link active-view" onclick="switchMainView('workout', this)">Workout</button>
            <button class="nav-link" onclick="switchMainView('calendar', this)">Calendar</button>
            <button class="nav-link" onclick="switchMainView('stats', this)">Analytics</button>
        </nav>
    </div>

    <script>
        // PWA Scripts
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
        let stashedPwaEvent = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); stashedPwaEvent = e;
            const btn = document.getElementById('pwa-install-btn');
            if (btn) { btn.textContent = '⬇ Install App to Device'; btn.style.background = 'rgba(6,182,212,0.15)'; }
        });
        window.addEventListener('appinstalled', () => {
            stashedPwaEvent = null;
            const btn = document.getElementById('pwa-install-btn');
            if (btn) btn.textContent = '✓ App Installed';
        });
        window.triggerPwaInstallation = async function() {
            if (window.matchMedia('(display-mode: standalone)').matches) { alert("This app is already installed on your device."); return; }
            if (stashedPwaEvent) {
                stashedPwaEvent.prompt();
                const { outcome } = await stashedPwaEvent.userChoice;
                if (outcome === 'accepted') stashedPwaEvent = null;
            } else {
                alert("Installation prompt not ready yet.\n\nThis usually means:\n• The app is already installed\n• Try refreshing the page and waiting a moment\n• Or use the browser menu → 'Install app' / 'Add to Home screen'");
            }
        };

        const factoryRoutine = [
            { id: "Mon", label: "MON", title: "Monday // Chest & Width Focus", exercises: [
                { name: "Incline Bench Press", sets: 3, reps: "12" }, { name: "Bench Press", sets: 3, reps: "12" }, { name: "Dumbbell Overhead Press", sets: 3, reps: "12" }, { name: "Lateral Raise", sets: 4, reps: "15" }, { name: "Tricep Rope Pushdown", sets: 3, reps: "12" }
            ]},
            { id: "Tue", label: "TUE", title: "Tuesday // Lat Width & Abs", exercises: [
                { name: "Lat Pulldown", sets: 4, reps: "12" }, { name: "Seated Cable Row", sets: 3, reps: "12" }, { name: "Facepull", sets: 3, reps: "15" }, { name: "Bicep Curl", sets: 3, reps: "12" }, { name: "Hanging Leg Raise", sets: 3, reps: "10" }
            ]},
            { id: "Thu", label: "THU", title: "Thursday // Shoulder Width Engine", exercises: [
                { name: "Machine Shoulder Press", sets: 3, reps: "12" }, { name: "Lateral Raise", sets: 4, reps: "15" }, { name: "Rear Delt Fly", sets: 3, reps: "12" }, { name: "Bicep Curl", sets: 3, reps: "12" }, { name: "Dumbbell Overhead Extension", sets: 3, reps: "10" }
            ]},
            { id: "Sat", label: "SAT", title: "Saturday // Density Hypertrophy", exercises: [
                { name: "Incline Bench Press", sets: 3, reps: "12" }, { name: "Lat Pulldown", sets: 3, reps: "12" }, { name: "Cable Lateral Raise", sets: 3, reps: "12" }, { name: "Hammer Curl", sets: 3, reps: "12" }
            ]}
        ];

        // System Date Utilities
        function getLocalDateString(date = new Date()) {
            const offset = date.getTimezoneOffset();
            const adjustedDate = new Date(date.getTime() - (offset * 60 * 1000));
            return adjustedDate.toISOString().split('T')[0];
        }
        const todayStamp = getLocalDateString();

        // State Engines
        let baseRoutine = JSON.parse(localStorage.getItem('alpha_routine')) || factoryRoutine;
        let selectedDayId = baseRoutine[0].id;
        let viewDate = new Date(); 
        let isEditMode = false;
        let dynamicScales = JSON.parse(localStorage.getItem('alpha_scales')) || {};
        let operationalLog = JSON.parse(localStorage.getItem('alpha_log')) || {};
        
        // --- NEW TIMER ENGINES ---
        let durationLog = JSON.parse(localStorage.getItem('alpha_durations')) || {};
        let sessionState = JSON.parse(localStorage.getItem('alpha_session')) || { date: todayStamp, isRunning: false, start: null, elapsed: 0 };
        let lastRestStart = null;

        // Reset session logic if it's a completely new day
        if (sessionState.date !== todayStamp) {
            sessionState = { date: todayStamp, isRunning: false, start: null, elapsed: 0 };
            localStorage.setItem('alpha_session', JSON.stringify(sessionState));
        }

        function formatTime(ms) {
            if(!ms || ms < 0) return "00:00";
            let totalSec = Math.floor(ms / 1000);
            let h = Math.floor(totalSec / 3600);
            let m = Math.floor((totalSec % 3600) / 60);
            let s = totalSec % 60;
            let pad = (num) => num.toString().padStart(2, '0');
            return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        }

        function saveSession() {
            localStorage.setItem('alpha_session', JSON.stringify(sessionState));
        }

        function tick() {
            const wTimer = document.getElementById('ui-workout-timer');
            const rTimer = document.getElementById('ui-rest-timer');
            
            if (wTimer) {
                let wTime = sessionState.elapsed;
                if (sessionState.isRunning) wTime += (Date.now() - sessionState.start);
                wTimer.textContent = formatTime(wTime);
            }
            if (rTimer) {
                if (lastRestStart) {
                    let rTime = Date.now() - lastRestStart;
                    rTimer.textContent = `Rest Time: ${formatTime(rTime)}`;
                } else {
                    rTimer.textContent = `Rest Time: --:--`;
                }
            }
        }
        setInterval(tick, 1000);

        function renderTimerDashboard() {
            const zone = document.getElementById('timer-dashboard-zone');
            if(isEditMode) { zone.innerHTML = ''; return; }
            
            const btnText = sessionState.isRunning ? 'Pause' : (sessionState.elapsed > 0 ? 'Continue' : 'Start');
            const btnClass = sessionState.isRunning ? 'btn-pause' : 'btn-start';

            zone.innerHTML = `
                <div class="timer-dashboard">
                    <div style="font-size:0.75rem; color:var(--text-muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Total Workout Time</div>
                    <div class="main-timer" id="ui-workout-timer">00:00</div>
                    <div class="timer-controls">
                        <button class="btn-timer ${btnClass}" onclick="toggleWorkoutTimer()">${btnText}</button>
                        ${sessionState.elapsed > 0 || sessionState.isRunning ? `<button class="btn-timer btn-stop" onclick="finishWorkout()">Finish</button>` : ''}
                    </div>
                    <div class="rest-timer" id="ui-rest-timer">Rest Time: --:--</div>
                </div>
            `;
            tick(); 
        }

        window.toggleWorkoutTimer = function() {
            if(sessionState.isRunning) {
                sessionState.elapsed += Date.now() - sessionState.start;
                sessionState.isRunning = false;
            } else {
                sessionState.start = Date.now();
                sessionState.isRunning = true;
            }
            saveSession();
            renderTimerDashboard();
        }

        window.finishWorkout = function() {
            if(confirm("Finish this workout and log your total duration?")) {
                if(sessionState.isRunning) {
                    sessionState.elapsed += Date.now() -
